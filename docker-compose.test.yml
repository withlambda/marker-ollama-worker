version: '3.8'

services:
  marker-pdf-test:
    build: .
    image: marker-pdf-ollama:test
    container_name: marker-pdf-ollama-test
    environment:
      - STORAGE_BUCKET_PATH=/workspace
      - INPUT_DIR=input
      - OUTPUT_DIR=output
      - OLLAMA_MODEL=llama3
      - OLLAMA_MODELS_DIR=/root/.ollama/models
      - MARKER_WORKERS=2
      - MARKER_PAGINATE_OUTPUT=false
      - MARKER_USE_LLM=true
      - MARKER_FORCE_OCR=false
    volumes:
      - ./test_data/input:/workspace/input
      - ./test_data/output:/workspace/output
      - ./ollama_models:/root/.ollama/models # Mount a volume for persistent models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
